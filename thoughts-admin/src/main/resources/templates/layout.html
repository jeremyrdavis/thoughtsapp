<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{#insert title}Thoughts Admin{/insert}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YcnS/1fk/xjkFAjseFn5OMBIoFUlJAmDBn0" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:wght@400;700&family=Red+Hat+Text:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <nav class="navbar navbar-dark navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="/">Thoughts Admin</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link {#insert dashboardActive}{/insert}" href="/"><i class="bi bi-speedometer2 me-1"></i>Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {#insert thoughtsActive}{/insert}" href="/thoughts"><i class="bi bi-chat-quote me-1"></i>Thoughts</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {#insert ratingsActive}{/insert}" href="/ratings"><i class="bi bi-bar-chart me-1"></i>Ratings</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {#insert evaluationsActive}{/insert}" href="/evaluations"><i class="bi bi-cpu me-1"></i>Evaluations</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main>
        <div class="container content-area">
            {#insert content}No content{/insert}
        </div>
    </main>

    <footer>
        <div class="container">
            Positive Thoughts Admin &mdash; A Red Hat Demo Application
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
